      justify-content: center;

      font-size: 28px;
      font-weight: 700;

    .logo .image {

      height: 56px;
      border-radius: 50%;

      font-weight: 600;

      font-weight: 700;

      margin: 0 auto 28px;

      line-height: 1.55;
      color: rgba(255, 255, 255, 0.85);
    }

      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.12);
      padding: 14px 20px;
      margin-bottom: 26px;
    }

      max-width: 760px;
      margin: 0 auto;
      padding: 22px 20px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.24);
