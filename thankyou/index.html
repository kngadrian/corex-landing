    body { font-family: "Inter", sans-serif; color: #fff; min-height: 100vh; background-image: url('../images/headerbg.png'), radial-gradient(#4666e5, #4f46e5, #1a2c54); background-size: cover; background-position: top center; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; font-size: 28px; font-weight: 700; }

      position: relative;

      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      line-height: 0;
    }
    .thankyou_video_wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .login_btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .login_btn:hover {
      transform: translateY(-2px);
